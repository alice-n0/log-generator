server:
  port: 8080
  servlet:
    context-path: /api
    
logging:
  level:
    root: INFO

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

spring:
  datasource:
    hikari:
      maximum-pool-size: 3          # 작게
      minimum-idle: 2
      connection-timeout: 1000      # 빨리 timeout
      idle-timeout: 30000


  