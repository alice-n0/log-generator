server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

pay:
  service:
    base-url: ${ORDER_SERVICE_BASE_URL}
    timeout: ${ORDER_SERVICE_TIMEOUT:2000}
