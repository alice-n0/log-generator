apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  labels:                    
    app: {{ .Values.name }}
spec:
  selector:
    app: {{ .Values.name }}
  ports:
  {{- range .Values.service.ports }}
    - name: {{ .name }}
      port: {{ .port }}
      targetPort: {{ .targetPort }}
  {{- end }}
