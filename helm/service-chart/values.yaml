name: default-service

replicaCount: 1

image:
  repository: myrepo/default
  tag: latest
  pullPolicy: Always

service:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 8081
      targetPort: 8081

monitoring:
  enabled: true
  port: metrics
  path: /actuator/prometheus
  
resources:
  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  cpu: 50

database:
  secretName: my-postgresql
